<svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient amber glow -->
    <radialGradient id="bg-glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%"   stop-color="#F9A825" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F9A825" stop-opacity="0"/>
    </radialGradient>
    <!-- Blade gradient — slightly lighter at tip -->
    <linearGradient id="blade-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E69520"/>
      <stop offset="100%" stop-color="#FFC043"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#F9A825" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="1024" height="1024" rx="224" fill="#0D1117"/>
  <rect width="1024" height="1024" rx="224" fill="url(#bg-glow)"/>

  <!-- ── Subtle border ─────────────────────────────────────────────── -->
  <rect width="1024" height="1024" rx="224"
        stroke="#F9A825" stroke-width="6" stroke-opacity="0.12" fill="none"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- SCISSORS — handles at the bottom, blades opening upward       -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- ── Left blade (handle bottom-left → tip upper-right) ──────── -->
  <path d="M 348 730 L 700 310"
        stroke="url(#blade-grad)" stroke-width="68"
        stroke-linecap="round" filter="url(#shadow)"/>

  <!-- ── Right blade (handle bottom-right → tip upper-left) ──────── -->
  <path d="M 676 730 L 324 310"
        stroke="url(#blade-grad)" stroke-width="68"
        stroke-linecap="round" filter="url(#shadow)"/>

  <!-- ── Pivot circle (where blades cross — hinge) ───────────────── -->
  <circle cx="512" cy="512" r="52"
          fill="#0D1117" stroke="url(#blade-grad)" stroke-width="42"/>

  <!-- ── Left handle ring ─────────────────────────────────────────── -->
  <circle cx="312" cy="768" r="96"
          fill="none" stroke="url(#blade-grad)" stroke-width="52"
          filter="url(#shadow)"/>
  <!-- Inner hole of left handle -->
  <circle cx="312" cy="768" r="44" fill="#0D1117"/>

  <!-- ── Right handle ring ────────────────────────────────────────── -->
  <circle cx="712" cy="768" r="96"
          fill="none" stroke="url(#blade-grad)" stroke-width="52"
          filter="url(#shadow)"/>
  <!-- Inner hole of right handle -->
  <circle cx="712" cy="768" r="44" fill="#0D1117"/>

  <!-- ── Small cut indicator dots (where blades are open/cutting) ── -->
  <!-- These show the "gap" between the blades — the cut point -->
  <circle cx="428" cy="392" r="16" fill="#F9A825" opacity="0.6"/>
  <circle cx="596" cy="392" r="16" fill="#F9A825" opacity="0.6"/>
</svg>
